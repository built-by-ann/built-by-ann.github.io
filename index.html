<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        // SPA 404 redirect handler
        (function (l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function (s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        }(window.location));

        // Scale the fixed 1440px layout to fit any screen
        var sw = screen.width;
        if (sw < 1440) {
          // Mobile: zoom #root (not html) so body height = content height, avoiding iOS empty-space bug
          var scale = (sw / 1440).toFixed(5);
          var s = document.createElement('style');
          s.textContent = '#root{zoom:' + scale + ';width:1440px}html,body{height:fit-content!important}';
          document.head.appendChild(s);
        } else {
          // Desktop: CSS zoom on html so the layout fills narrower browser windows
          var applyZoom = function () {
            document.documentElement.style.zoom = (window.innerWidth / 1440).toString();
          };
          applyZoom();
          window.addEventListener('resize', applyZoom);
        }
      })();
    </script>
